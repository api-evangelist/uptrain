- Evaluation
- LLM Evaluation
- Open Source
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of UpTrain spend. The open-source framework carries no license
  cost (Apache-2.0); the dominant cost when self-hosting is the upstream LLM
  provider spend incurred by grading calls (each check issues one or more LLM
  requests against your own OpenAI / Anthropic / Azure key). The managed
  UpTrain service adds a usage-based charge that is not publicly documented.
  The primary FinOps lever is controlling the number and model of grading
  calls.
notes: >-
  Open-source UpTrain is free; the real, attributable cost is the upstream LLM
  grading spend. Managed-tier pricing is undocumented and must be confirmed
  with UpTrain. Note the project's limited public activity since mid-2024 when
  planning multi-year FinOps commitments.
sources:
- https://uptrain.ai/
- https://github.com/uptrain-ai/uptrain
- https://docs.uptrain.ai/
