  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: UpTrain
serviceCategory: AI and Machine Learning
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
focusColumns:
  ServiceName: UpTrain Evaluation
  ServiceCategory: AI and Machine Learning
  ProviderName: UpTrain
  PublisherName: UpTrain
  InvoiceIssuerName: UpTrain
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingCategory: Usage-Based
meters:
- name: evaluations
  description: Number of evaluation rows scored across the requested checks.
  unit: rows
  aggregation: sum
  dimensions:
  - account
  - project
  - check
- name: checks_run
  description: Total individual check executions (rows x checks).
  unit: checks
  aggregation: sum
  dimensions:
  - account
  - project
  - check
- name: upstream_llm_tokens
  description: >-
    Tokens consumed against your own LLM provider key by UpTrain grading calls
    when self-hosting the open-source framework.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - model
  - check
principles:
- name: Visibility
  description: Track number of evaluation rows and checks run, and inspect upstream LLM token burn from grading calls.
- name: Allocation
  description: Tag evaluations by project / experiment to map evaluation cost to features and teams.
- name: Optimization
  description: >-
    Limit checks to those that matter, sample rather than evaluate every
    production row, and route grading to a cheaper-but-adequate model to cut
    upstream LLM spend.
- name: Accountability
  description: Assign owners per project; review evaluation volume and grading model spend against budget.
maintainers:
